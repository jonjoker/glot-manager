name: Feature request
description: Suggest an idea for Glot
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the API or behavior look like?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
